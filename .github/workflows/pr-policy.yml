name: "UNTRUSTED PR #3 migration bootstrap"

on:
  # TEMPORARY: PR #3 bootstrap signal. Delete this entire workflow in the
  # immediate cleanup PR after trusted-pr-policy.yml reaches main.
  pull_request:
    branches: [main]
    types: [synchronize]

concurrency:
  group: untrusted-pr-3-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  bootstrap-untrusted:
    name: "UNTRUSTED migration marker (not policy)"
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Emit migration marker only
        shell: bash
        run: |
          echo "::warning::UNTRUSTED TEMPORARY bootstrap signal; this is not a policy verdict"
          echo "No repository checkout, repository script, token, or secret is used."
