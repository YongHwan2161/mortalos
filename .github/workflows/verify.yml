name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium for browser verification
        run: npx playwright install --with-deps chromium

      - name: Run repository verification
        run: npm test

      - name: Compare Chromium with the committed portable corpus
        run: npm run test:chromium

      - name: Run MortalOS Lab browser acceptance gate
        run: npm run verify:lab

      - name: Compare virtual transport schedules in Node and Chromium
        run: npm run verify:transport

      - name: Enforce validator branch coverage
        run: npm run test:coverage

      - name: Verify the S0 baseline receipt
        run: npm run verify:baseline

      - name: Audit production and development dependencies
        run: npm audit --audit-level=moderate
